name: dermalens
description: AI-powered skin condition detection using YOLOv11
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.6.0

  # Image handling
  image_picker: ^1.1.2

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
